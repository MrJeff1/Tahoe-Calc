<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calculator</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="calculator">

    <!-- Traffic lights -->
    <div class="titlebar">
      <span class="dot red"></span>
      <span class="dot yellow"></span>
      <span class="dot green"></span>
    </div>

    <!-- Display -->
    <div class="display">
      <div class="expression" id="expression">&nbsp;</div>
      <div class="result" id="result">0</div>
    </div>

    <!-- Buttons -->
    <div class="grid">
      <button class="btn fn"    data-action="backspace">&#x232B;</button>
      <button class="btn fn"    data-action="clear">AC</button>
      <button class="btn fn"    data-action="percent">%</button>
      <button class="btn op"    data-action="op" data-op="/">÷</button>

      <button class="btn digit" data-action="digit" data-val="7">7</button>
      <button class="btn digit" data-action="digit" data-val="8">8</button>
      <button class="btn digit" data-action="digit" data-val="9">9</button>
      <button class="btn op"    data-action="op" data-op="*">×</button>

      <button class="btn digit" data-action="digit" data-val="4">4</button>
      <button class="btn digit" data-action="digit" data-val="5">5</button>
      <button class="btn digit" data-action="digit" data-val="6">6</button>
      <button class="btn op"    data-action="op" data-op="-">−</button>

      <button class="btn digit" data-action="digit" data-val="1">1</button>
      <button class="btn digit" data-action="digit" data-val="2">2</button>
      <button class="btn digit" data-action="digit" data-val="3">3</button>
      <button class="btn op"    data-action="op" data-op="+">+</button>

      <button class="btn fn"    data-action="negate">+/−</button>
      <button class="btn digit" data-action="digit" data-val="0">0</button>
      <button class="btn digit" data-action="digit" data-val=".">.</button>
      <button class="btn op"    data-action="equals">=</button>
    </div>

  </div>

  <script src="neutralino.js"></script>
  <script src="app.js"></script>
</body>
</html>
